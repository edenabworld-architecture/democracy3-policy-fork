name: Apply Encoding Fix v1.2 Simple

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/apply-encoding-v1.2.yml"

permissions:
  contents: write

concurrency:
  group: democracy3-encoding-simple
  cancel-in-progress: false

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply public-file correction
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          root = Path.cwd()
          index = root / "index.html"
          readme_path = root / "README.md"
          notes_path = root / "RELEASE_NOTES_v1.2.md"

          def read(path):
              raw = path.read_bytes()
              if raw.startswith(b"\xef\xbb\xbf"):
                  raise SystemExit(f"[FAIL] UTF-8 BOM 발견: {path}")
              return raw.decode("utf-8", errors="strict")

          def write(path, text):
              path.write_text(
                  text.replace("\r\n", "\n"),
                  encoding="utf-8",
                  newline="\n",
              )

          source = read(index)

          old_detector = r'return / |Ã.|Â.|â€|â€™|ì[\x80-\xBF]|ë[\x80-\xBF]|ðŸ/.test(s)'
          new_detector = r'return /(?:\uFFFD|Ã.|Â.|â€|â€™|ì[\x80-\xBF]|ë[\x80-\xBF]|ðŸ)/.test(s)'

          if old_detector in source:
              source = source.replace(old_detector, new_detector, 1)
          elif new_detector not in source:
              raise SystemExit("[FAIL] hasMojibake 교정 대상 문구를 찾지 못했습니다.")

          old_maturity = "explicit.match(/\x08S([0-8])\x08/)"
          new_maturity = r"explicit.match(/\bS([0-8])\b/)"

          if old_maturity in source:
              source = source.replace(old_maturity, new_maturity, 1)
          elif new_maturity not in source:
              raise SystemExit("[FAIL] S0~S8 정규식 교정 대상 문구를 찾지 못했습니다.")

          if "\x08" in source:
              raise SystemExit("[FAIL] index.html에 U+0008 제어문자가 남아 있습니다.")
          if old_detector in source:
              raise SystemExit("[FAIL] 공백 오탐 정규식이 남아 있습니다.")

          marker = "<!-- release: Democracy 3.0 정책포크 v1.2 · UTF-8 encoding correction -->"
          if marker not in source:
              source = source.replace(
                  "<!doctype html>\n",
                  f"<!doctype html>\n{marker}\n",
                  1,
              )

          write(index, source)

          readme = read(readme_path)
          readme = re.sub(
              r"^# Democracy 3\.0 정책포크 v[0-9.]+",
              "# Democracy 3.0 정책포크 v1.2",
              readme,
              count=1,
          )
          readme = re.sub(
              r"^## v[0-9.]+ 핵심$",
              "## v1.2 핵심",
              readme,
              count=1,
              flags=re.M,
          )

          section = (
              "\n\n## v1.2 문자 인코딩 교정\n\n"
              "- 정상적인 띄어쓰기를 문자 인코딩 오류로 오인하던 화면 정규식을 교정했습니다.\n"
              "- S0~S8 분석단계 판별식에 섞인 U+0008 제어문자를 제거했습니다.\n"
              "- 정상 한국어 문장과 실제 문자 깨짐을 구분하는 회귀검사를 추가했습니다.\n"
          )

          if "## v1.2 문자 인코딩 교정" not in readme:
              readme = readme.rstrip() + section

          write(readme_path, readme.rstrip() + "\n")

          notes = (
              "# Democracy 3.0 정책포크 v1.2 — 문자 인코딩 교정판\n\n"
              "## 교정 사항\n\n"
              "1. 일반 공백을 문자 인코딩 오류로 판정하던 `hasMojibake()` 정규식을 교정했습니다.\n"
              "2. S0~S8 판별 정규식의 U+0008 제어문자를 JavaScript 단어 경계 `\\\\b`로 복원했습니다.\n"
              "3. UTF-8 strict 디코딩과 정상 한국어 오탐 회귀검사를 적용했습니다.\n\n"
              "창안 및 원안 설계: 박찬성\n"
          )
          write(notes_path, notes)

          print("[PASS] 공개 파일 교정 완료")
          PY

      - name: Verify correction
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          index = Path("index.html")
          raw = index.read_bytes()

          if raw.startswith(b"\xef\xbb\xbf"):
              raise SystemExit("[FAIL] index.html UTF-8 BOM")

          text = raw.decode("utf-8", errors="strict")

          expected_detector = r"return /(?:\uFFFD|Ã.|Â.|â€|â€™|ì[\x80-\xBF]|ë[\x80-\xBF]|ðŸ)/.test(s)"
          expected_maturity = r"explicit.match(/\bS([0-8])\b/)"

          errors = []

          if expected_detector not in text:
              errors.append("교정된 hasMojibake 정규식 누락")
          if r"return / |Ã." in text:
              errors.append("공백 오탐 정규식 잔존")
          if expected_maturity not in text:
              errors.append("S0~S8 단어 경계 정규식 누락")
          if "\x08" in text:
              errors.append("U+0008 제어문자 잔존")

          detector = re.compile(
              r"\uFFFD|Ã.|Â.|â€|â€™|ì[\x80-\xBF]|ë[\x80-\xBF]|ðŸ"
          )

          normal = [
              "정상 한국어 문장입니다.",
              "정책을 공격하되 사람을 공격하지 않습니다.",
              "S1 자동 초기분석 · 공식자료 확인 필요",
          ]
          broken = ["문자 깨짐   테스트", "Ã¬Â\xa0Â•", "â€™broken"]

          for sample in normal:
              if detector.search(sample):
                  errors.append(f"정상 문장 오탐: {sample}")

          for sample in broken:
              if not detector.search(sample):
                  errors.append(f"깨진 문장 미탐: {sample}")

          readme = Path("README.md").read_text(encoding="utf-8")
          if not readme.startswith("# Democracy 3.0 정책포크 v1.2"):
              errors.append("README 버전이 v1.2가 아님")

          if errors:
              for error in errors:
                  print("[FAIL]", error)
              raise SystemExit(1)

          print("[PASS] v1.2 문자 인코딩 검사 통과")
          PY

          python validate_release.py

      - name: Check browser JavaScript syntax
        shell: bash
        run: |
          python - <<'PY'
          import re
          from pathlib import Path

          html = Path("index.html").read_text(encoding="utf-8")
          scripts = re.findall(
              r"<script(?:\s[^>]*)?>(.*?)</script>",
              html,
              flags=re.S | re.I,
          )

          if not scripts:
              raise SystemExit("[FAIL] JavaScript 블록을 찾지 못했습니다.")

          Path("/tmp/democracy3-index.js").write_text(
              "\n".join(scripts),
              encoding="utf-8",
          )
          PY

          node --check /tmp/democracy3-index.js

      - name: Commit corrected public files
        shell: bash
        run: |
          git config user.name "democracy3-maintenance-bot"
          git config user.email "actions@users.noreply.github.com"

          git add index.html README.md RELEASE_NOTES_v1.2.md

          if git diff --cached --quiet; then
            echo "[INFO] 이미 교정된 상태입니다."
            exit 0
          fi

          git commit -m "v1.2 문자 인코딩 교정"
          git pull --rebase
          git push
