name: Update National Assembly bills

on:
  workflow_dispatch:
  schedule:
    - cron: "20 21 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch National Assembly bills
        env:
          ASSEMBLY_API_KEY: ${{ secrets.ASSEMBLY_API_KEY }}
          ASSEMBLY_AGE: "22"
        run: python fetch_bills.py

      - name: Commit updated data
        run: |
          git config user.name "democracy3-bot"
          git config user.email "actions@users.noreply.github.com"
          git add bills.json
          git diff --cached --quiet || git commit -m "자동 갱신: 국회 의안정보"
          git push
