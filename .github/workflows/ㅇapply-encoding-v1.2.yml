name: Apply Democracy 3.0 Encoding v1.2

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/apply-encoding-v1.2.yml"

permissions:
  contents: write

concurrency:
  group: democracy3-encoding-v1-2
  cancel-in-progress: false

jobs:
  apply-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Apply encoding correction v1.2
        shell: bash
        run: |
          python - <<'PY'
          from __future__ import annotations

          import json
          import re
          from pathlib import Path

          ROOT = Path.cwd()
          INDEX = ROOT / "index.html"
          README = ROOT / "README.md"
          NOTES = ROOT / "RELEASE_NOTES_v1.2.md"
          VALIDATOR = ROOT / "scripts" / "validate_encoding_v1_2.py"
          SCHEMA_VALIDATOR = ROOT / "scripts" / "validate_public_schema_compat.py"
          QUALITY_GATE = ROOT / ".github" / "workflows" / "public-display-quality-gate.yml"
          OLD_GATE = ROOT / ".github" / "workflows" / "Public Korean Quality Gate"
          UPDATE_WORKFLOW = ROOT / ".github" / "workflows" / "update.yml"

          def read_utf8(path: Path) -> str:
              raw = path.read_bytes()
              if raw.startswith(b"\xef\xbb\xbf"):
                  raise RuntimeError(f"{path}: UTF-8 BOM이 포함되어 있습니다")
              return raw.decode("utf-8", errors="strict")

          def write_utf8(path: Path, text: str) -> None:
              path.parent.mkdir(parents=True, exist_ok=True)
              path.write_text(text.replace("\r\n", "\n"), encoding="utf-8", newline="\n")

          # 1) 공개 화면의 두 가지 실제 손상 교정
          source = read_utf8(INDEX)
          before = source
          bad_detector = r'return / |Ã.|Â.|â€|â€™|ì[\x80-\xBF]|ë[\x80-\xBF]|ðŸ/.test(s)'
          good_detector = r'return /(?:\uFFFD|Ã.|Â.|â€|â€™|ì[\x80-\xBF]|ë[\x80-\xBF]|ðŸ)/.test(s)'
          bad_maturity = 'explicit.match(/\x08S([0-8])\x08/)'
          good_maturity = r'explicit.match(/\bS([0-8])\b/)'
          release_marker = '<!-- release: Democracy 3.0 정책포크 v1.2 · UTF-8 encoding correction -->'

          if bad_detector in source:
              source = source.replace(bad_detector, good_detector, 1)
          elif good_detector not in source:
              raise RuntimeError("index.html에서 hasMojibake 교정 대상 또는 v1.2 교정본을 찾지 못했습니다")

          if bad_maturity in source:
              source = source.replace(bad_maturity, good_maturity, 1)
          elif good_maturity not in source:
              raise RuntimeError("index.html에서 S0~S8 성숙도 정규식 교정 대상 또는 v1.2 교정본을 찾지 못했습니다")

          if "\x08" in source:
              raise RuntimeError("index.html에 U+0008 제어문자가 추가로 남아 있습니다")

          if release_marker not in source:
              source = source.replace("<!doctype html>\n", f"<!doctype html>\n{release_marker}\n", 1)

          if source != before:
              write_utf8(INDEX, source)

          # 2) README 버전과 교정 내역
          readme = read_utf8(README)
          readme = re.sub(r"^# Democracy 3\.0 정책포크 v[0-9.]+", "# Democracy 3.0 정책포크 v1.2", readme, count=1)
          readme = re.sub(r"^## v[0-9.]+ 핵심$", "## v1.2 핵심", readme, count=1, flags=re.M)
          if "## v1.2 문자 인코딩 교정" not in readme:
              readme = readme.rstrip() + """

          ## v1.2 문자 인코딩 교정

          - 정상적인 띄어쓰기를 문자 인코딩 오류로 오인하던 공개 화면의 감지 정규식을 교정했습니다.
          - S0~S8 분석 성숙도 판별식에 섞인 제어문자(U+0008)를 제거하고 JavaScript 단어 경계(`\\b`)를 복원했습니다.
          - 공개 HTML·JSON을 UTF-8 strict 모드로 검사하고 대체문자·모지바케·비허용 제어문자를 차단합니다.
          - 정상 한국어 문장과 실제 깨진 문자열을 함께 사용하는 회귀검사를 추가했습니다.
          - 자동 갱신과 공개 품질 게이트에서 동일 검사를 반복해 재발을 방지합니다.
          """ + "\n"
          write_utf8(README, readme)

          # 3) 릴리스 기록
          notes = """# Democracy 3.0 정책포크 v1.2 — 문자 인코딩 교정판

          기준일: 2026-07-23

          ## 확인된 원인

          1. 공개 화면의 `hasMojibake()` 정규식 첫 대안이 대체문자(U+FFFD)가 아니라 일반 공백으로 저장되어, 띄어쓰기가 포함된 정상 한국어 문장까지 오류로 판정했습니다.
          2. 분석 성숙도 판별식의 `\\bS([0-8])\\b`가 실제 U+0008 제어문자로 변형되어 S0~S8 표기를 안정적으로 읽지 못했습니다.
          3. 기존 공개 품질 게이트는 확장자가 없고 존재하지 않는 검사 스크립트를 호출하여 자동 검증이 완결되지 않았습니다.

          ## 반영 내용

          - 공백 오탐 대안을 `\\uFFFD` 탐지로 교체했습니다.
          - S0~S8 정규식의 단어 경계를 정상적인 JavaScript `\\b`로 복원했습니다.
          - UTF-8 strict 디코딩, BOM·대체문자·모지바케·비허용 제어문자 검사를 추가했습니다.
          - 정상 한국어·깨진 문자열·S0~S8 표현을 회귀검사 대상으로 고정했습니다.
          - 유효한 `.yml` 공개 품질 게이트와 자동 갱신 전 검사를 연결했습니다.

          ## 검증 명령

          ```bash
          python scripts/validate_encoding_v1_2.py
          python scripts/validate_public_korean.py
          python scripts/validate_public_schema_compat.py
          python validate_release.py
          ```

          창안 및 원안 설계: 박찬성
          """
          write_utf8(NOTES, notes)

          # 4) 독립 UTF-8·회귀 검증기
          validator = r'''#!/usr/bin/env python3
          """Democracy 3.0 정책포크 v1.2 공개 문자 인코딩 회귀검사."""
          from __future__ import annotations

          import json
          import re
          import sys
          from pathlib import Path

          ROOT = Path(__file__).resolve().parents[1]
          INDEX = ROOT / "index.html"
          PUBLIC_FILES = [
              "index.html", "fork-studio-ai.html", "README.md", "release-status.json",
              "bills-index.json", "bills.json", "policy-lifecycle.json", "civic-log.json",
              "source-registry.json",
          ]
          MOJIBAKE = re.compile(r"\uFFFD|Ã.|Â.|â€|â€™|ì[\x80-\xBF]|ë[\x80-\xBF]|ðŸ")
          EXPECTED_DETECTOR = r"return /(?:\uFFFD|Ã.|Â.|â€|â€™|ì[\x80-\xBF]|ë[\x80-\xBF]|ðŸ)/.test(s)"
          EXPECTED_MATURITY = r"explicit.match(/\bS([0-8])\b/)"
          RELEASE_MARKER = "<!-- release: Democracy 3.0 정책포크 v1.2 · UTF-8 encoding correction -->"

          def read_utf8(path: Path) -> str:
              raw = path.read_bytes()
              if raw.startswith(b"\xef\xbb\xbf"):
                  raise ValueError("UTF-8 BOM 발견")
              return raw.decode("utf-8", errors="strict")

          def controls(text: str):
              return [(i, ord(ch)) for i, ch in enumerate(text)
                      if (ord(ch) < 32 and ch not in "\t\n\r") or ord(ch) == 127]

          def paths():
              result = [ROOT / name for name in PUBLIC_FILES if (ROOT / name).exists()]
              reports = ROOT / "reports"
              if reports.exists():
                  result.extend(sorted(reports.glob("*.json")))
              return result

          errors = []
          try:
              index = read_utf8(INDEX)
          except Exception as exc:
              print(f"[FAIL] index.html UTF-8 읽기 실패: {exc}")
              raise SystemExit(1)

          if EXPECTED_DETECTOR not in index:
              errors.append("v1.2 hasMojibake 정규식이 없습니다")
          if r"return / |Ã." in index:
              errors.append("일반 공백을 오류로 판정하는 옛 정규식이 남아 있습니다")
          if EXPECTED_MATURITY not in index:
              errors.append("S0~S8 단어 경계 정규식이 복원되지 않았습니다")
          if "\x08" in index:
              errors.append("index.html에 U+0008 제어문자가 남아 있습니다")
          if RELEASE_MARKER not in index:
              errors.append("v1.2 릴리스 표식이 없습니다")
          if '<meta charset="utf-8">' not in index.lower():
              errors.append("UTF-8 메타 선언이 없습니다")

          detector = re.compile(r"\uFFFD|Ã.|Â.|â€|â€™|ì[\x80-\xBF]|ë[\x80-\xBF]|ðŸ")
          normal = [
              "정상 한국어 문장입니다.",
              "정책을 공격하되 사람을 공격하지 않습니다.",
              "S1 자동 초기분석 · 공식자료 확인 필요",
          ]
          broken = ["문자 깨짐 � 테스트", "Ã¬Â Â•Ã¬Â±â€¦", "â€™broken quote"]
          for sample in normal:
              if detector.search(sample):
                  errors.append(f"정상 한국어 오탐: {sample}")
          for sample in broken:
              if not detector.search(sample):
                  errors.append(f"깨진 문자열 미탐: {sample}")
          for level in range(9):
              if not re.search(r"\bS([0-8])\b", f"S{level} 자동 분석"):
                  errors.append(f"성숙도 회귀검사 실패: S{level}")

          for path in paths():
              rel = path.relative_to(ROOT)
              try:
                  text = read_utf8(path)
              except Exception as exc:
                  errors.append(f"{rel}: UTF-8 strict 실패: {exc}")
                  continue
              bad = controls(text)
              if bad:
                  preview = ", ".join(f"{pos}=U+{code:04X}" for pos, code in bad[:5])
                  errors.append(f"{rel}: 비허용 제어문자 ({preview})")
              if path != INDEX and MOJIBAKE.search(text):
                  errors.append(f"{rel}: 대체문자 또는 모지바케 패턴")
              if path.suffix.lower() == ".json":
                  try:
                      json.loads(text)
                  except Exception as exc:
                      errors.append(f"{rel}: JSON 파싱 실패: {exc}")

          readme = read_utf8(ROOT / "README.md")
          if not readme.startswith("# Democracy 3.0 정책포크 v1.2"):
              errors.append("README.md 공개 버전이 v1.2가 아닙니다")
          if "## v1.2 문자 인코딩 교정" not in readme:
              errors.append("README.md에 v1.2 교정 내역이 없습니다")
          if not (ROOT / "RELEASE_NOTES_v1.2.md").exists():
              errors.append("RELEASE_NOTES_v1.2.md가 없습니다")

          if errors:
              print(f"[FAIL] v1.2 문자 인코딩 검증 실패: {len(errors)}건")
              for error in errors:
                  print(f"[FAIL] {error}")
              raise SystemExit(1)

          print("[PASS] Democracy 3.0 정책포크 v1.2 문자 인코딩 검증 완료")
          print(f"[INFO] 공개 파일 {len(paths())}개 UTF-8 strict·제어문자·모지바케 검사 통과")
          '''
          write_utf8(VALIDATOR, validator.lstrip())

          # 5) 현재 UI가 실제 공개 데이터 구조를 읽을 수 있는지 검사
          schema_validator = r'''#!/usr/bin/env python3
          """공개 UI와 정책·보고서 JSON의 최소 구조 호환성 검사."""
          from __future__ import annotations

          import json
          from pathlib import Path

          ROOT = Path(__file__).resolve().parents[1]
          INDEX = ROOT / "index.html"
          CANDIDATES = [ROOT / "bills-index.json", ROOT / "bills.json"]
          REQUIRED_UI_TOKENS = [
              "bills-index.json", "maturityOf", "normalizeText", "collectRisks",
              "collectClaims", "collectForks", "renderModal",
          ]

          errors = []
          index = INDEX.read_text(encoding="utf-8")
          for token in REQUIRED_UI_TOKENS:
              if token not in index:
                  errors.append(f"index.html 필수 UI 토큰 누락: {token}")

          bills_path = next((p for p in CANDIDATES if p.exists()), None)
          if not bills_path:
              errors.append("bills-index.json 또는 bills.json이 없습니다")
              bills = []
          else:
              try:
                  payload = json.loads(bills_path.read_text(encoding="utf-8"))
                  bills = payload.get("bills", payload if isinstance(payload, list) else [])
                  if not isinstance(bills, list):
                      errors.append(f"{bills_path.name}: bills가 배열이 아닙니다")
                      bills = []
              except Exception as exc:
                  errors.append(f"{bills_path.name}: JSON 읽기 실패: {exc}")
                  bills = []

          for i, bill in enumerate(bills):
              if not isinstance(bill, dict):
                  errors.append(f"bills[{i}]: 객체가 아닙니다")
                  continue
              if not str(bill.get("id", "")).strip():
                  errors.append(f"bills[{i}]: id 누락")
              if not str(bill.get("title", "")).strip():
                  errors.append(f"bills[{i}]: title 누락")

          reports = ROOT / "reports"
          report_count = 0
          if reports.exists():
              for path in sorted(reports.glob("*.json")):
                  report_count += 1
                  try:
                      data = json.loads(path.read_text(encoding="utf-8"))
                      if not isinstance(data, (dict, list)):
                          errors.append(f"{path.relative_to(ROOT)}: 최상위 구조가 객체·배열이 아닙니다")
                  except Exception as exc:
                      errors.append(f"{path.relative_to(ROOT)}: JSON 읽기 실패: {exc}")

          if errors:
              print(f"[FAIL] 공개 스키마 호환성 검사 실패: {len(errors)}건")
              for error in errors[:100]:
                  print(f"[FAIL] {error}")
              raise SystemExit(1)

          print(f"[PASS] 공개 UI·정책 데이터 스키마 호환성 통과 · 정책 {len(bills)}건 · 보고서 {report_count}건")
          '''
          write_utf8(SCHEMA_VALIDATOR, schema_validator.lstrip())

          # 6) 확장자가 없던 기존 게이트를 정상 .yml 워크플로로 교체
          quality_gate = '''name: Public Display Quality Gate

          on:
            workflow_dispatch:
            push:
              paths:
                - "index.html"
                - "fork-studio-ai.html"
                - "README.md"
                - "RELEASE_NOTES_v1.2.md"
                - "bills-index.json"
                - "bills.json"
                - "reports/**"
                - "scripts/validate_encoding_v1_2.py"
                - "scripts/validate_public_korean.py"
                - "scripts/validate_public_schema_compat.py"
            pull_request:
              paths:
                - "index.html"
                - "fork-studio-ai.html"
                - "README.md"
                - "RELEASE_NOTES_v1.2.md"
                - "bills-index.json"
                - "bills.json"
                - "reports/**"
                - "scripts/validate_encoding_v1_2.py"
                - "scripts/validate_public_korean.py"
                - "scripts/validate_public_schema_compat.py"

          permissions:
            contents: read

          jobs:
            validate-public-display:
              runs-on: ubuntu-latest
              steps:
                - uses: actions/checkout@v4
                - uses: actions/setup-python@v5
                  with:
                    python-version: "3.12"
                - name: Validate v1.2 UTF-8 encoding regression
                  run: python scripts/validate_encoding_v1_2.py
                - name: Validate Korean, encoding and repeated risks
                  run: python scripts/validate_public_korean.py
                - name: Validate UI and report schema compatibility
                  run: python scripts/validate_public_schema_compat.py
          '''
          write_utf8(QUALITY_GATE, quality_gate.lstrip())
          if OLD_GATE.exists():
              OLD_GATE.unlink()

          # 7) 매일 자동 갱신 직후에도 동일 검사 실행
          update = read_utf8(UPDATE_WORKFLOW)
          marker = "      - name: Validate v1.2 public encoding\n"
          if marker not in update:
              insertion = (
                  "      - name: Validate v1.2 public encoding\n"
                  "        run: python scripts/validate_encoding_v1_2.py\n\n"
                  "      - name: Validate public Korean and repeated risks\n"
                  "        run: python scripts/validate_public_korean.py\n\n"
                  "      - name: Validate public UI schema compatibility\n"
                  "        run: python scripts/validate_public_schema_compat.py\n\n"
              )
              target = "      - name: Validate public release\n"
              if target not in update:
                  raise RuntimeError("update.yml에서 공개 검증 단계를 찾지 못했습니다")
              update = update.replace(target, insertion + target, 1)
              write_utf8(UPDATE_WORKFLOW, update)

          print("[PASS] v1.2 교정 파일 생성 및 워크플로 연결 완료")
          PY

      - name: Validate v1.2 encoding regression
        run: python scripts/validate_encoding_v1_2.py

      - name: Validate public Korean and repeated risks
        run: python scripts/validate_public_korean.py

      - name: Validate public UI schema compatibility
        run: python scripts/validate_public_schema_compat.py

      - name: Validate existing release integrity
        run: python validate_release.py

      - name: Parse browser JavaScript
        shell: bash
        run: |
          python - <<'PY'
          import re
          from pathlib import Path
          html = Path("index.html").read_text(encoding="utf-8")
          scripts = re.findall(r"<script(?:\s[^>]*)?>(.*?)</script>", html, flags=re.S | re.I)
          if not scripts:
              raise SystemExit("[FAIL] index.html에서 JavaScript를 찾지 못했습니다")
          Path("/tmp/d3-index.js").write_text("\n".join(scripts), encoding="utf-8")
          print(f"[INFO] JavaScript 블록 {len(scripts)}개 추출")
          PY
          node --check /tmp/d3-index.js

      - name: Commit verified v1.2 correction
        shell: bash
        run: |
          git config user.name "democracy3-maintenance-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "[INFO] 추가 변경 없음 — v1.2 교정 상태가 이미 유지되고 있습니다."
            exit 0
          fi
          git commit -m "v1.2 문자 인코딩 교정 및 회귀검증"
          git pull --rebase
          git push
