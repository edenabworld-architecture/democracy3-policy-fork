name: Probe official bill documents

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  probe:
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Diagnose official pages
        run: python probe_official_documents.py
      - name: Upload diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: official-document-diagnostics
          path: document-diagnostics.json
          retention-days: 14
