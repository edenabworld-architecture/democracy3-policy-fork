name: Update and validate policy data

on:
  workflow_dispatch:
  schedule:
    - cron: "20 21 * * *"

permissions:
  contents: write
  issues: read

concurrency:
  group: democracy3-policy-data-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate, validate and publish verified release
        shell: bash
        env:
          ASSEMBLY_API_KEY: ${{ secrets.ASSEMBLY_API_KEY }}
          ASSEMBLY_AGE: "22"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -Eeuo pipefail

          git config user.name "democracy3-bot"
          git config user.email "actions@users.noreply.github.com"

          # A concurrent manual commit or another data run can advance main
          # while generation is in progress. Never rebase generated outputs.
          # Reset to the newest main, regenerate, and retry the push instead.
          for attempt in 1 2 3; do
            echo "=== publish attempt ${attempt}/3 ==="

            git fetch origin main
            git reset --hard origin/main
            git clean -fd

            # Remove Python runtime artifacts, including any old tracked cache.
            find . -type d -name '__pycache__' -prune -exec rm -rf {} +
            find . -type f \( -name '*.pyc' -o -name '*.pyo' \) -delete

            python fetch_bills.py
            python sync_civic_log.py
            python policy_history.py
            python validate_release.py
            python -m json.tool release-status.json

            # Python execution recreates caches; never publish them.
            find . -type d -name '__pycache__' -prune -exec rm -rf {} +
            find . -type f \( -name '*.pyc' -o -name '*.pyo' \) -delete

            git add -A

            if git diff --cached --quiet; then
              echo "No verified release changes to publish."
              exit 0
            fi

            git commit -m "자동 갱신: 검증된 정책 데이터와 시범보고서"

            if git push origin HEAD:main; then
              echo "Verified release published successfully."
              exit 0
            fi

            echo "Remote main advanced during generation. Regenerating from the newest main."
            sleep $((attempt * 5))
          done

          echo "Failed to publish after 3 regeneration attempts."
          exit 1
