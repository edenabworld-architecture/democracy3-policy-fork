name: Update National Assembly bills

on:
  workflow_dispatch:
  schedule:
    - cron: "20 21 * * *"

permissions:
  contents: write

concurrency:
  group: democracy3-policy-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: macos-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch National Assembly bills
        env:
          ASSEMBLY_API_KEY: ${{ secrets.ASSEMBLY_API_KEY }}
          ASSEMBLY_AGE: "22"
        run: python fetch_bills.py

      - name: Validate generated policy data
        run: python validate_site.py

      - name: Commit verified data
        run: |
          git config user.name "democracy3-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "자동 갱신: 검증된 분할 정책보고서"
          git push
