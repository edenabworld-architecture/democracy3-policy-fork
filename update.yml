name: Update policy data
on:
  workflow_dispatch:
  schedule:
    - cron: "20 21 * * *"
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - env:
          ASSEMBLY_API_KEY: ${{ secrets.ASSEMBLY_API_KEY }}
          ASSEMBLY_API_SERVICE: ${{ secrets.ASSEMBLY_API_SERVICE }}
          ASSEMBLY_AGE: "22"
        run: python scripts/fetch_bills.py
      - run: |
          git config user.name "democracy3-bot"
          git config user.email "actions@users.noreply.github.com"
          git add site/data/bills.json
          git diff --cached --quiet || git commit -m "자동 갱신: 국회 의안"
          git push
